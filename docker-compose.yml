services:
  # --- Backend API ---
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ikp-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./vector_db:/app/vector_db
      - ./database:/app/database
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - ikp-network
    restart: unless-stopped

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ikp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ikp-network
    restart: unless-stopped

  # --- Neo4j Knowledge Graph ---
  neo4j:
    image: neo4j:5-community
    container_name: ikp-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ikp-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ikp-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
